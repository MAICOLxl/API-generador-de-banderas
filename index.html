<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Paises</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌍 Comparador de Países</h1>
    </header>
    
    <main>
        <section class="contenedor-seleccion">
            <div class="busqueda-wrapper">
                <label for="buscar-pais">Buscar país:</label>
                <div class="autocomplete-container">
                    <input 
                    type="text" 
                    id="buscar-pais" 
                    placeholder="Ejemplo: México, España, China..."
                    autocomplete="off"
                    >
                    <ul id="sugerencias" class="sugerencias"></ul>
                </div>
                <p>Selecciona 2 o más países para compararlos por población, capital, región, idioma y bandera.</p>
            </div>

            <div class="paises-seleccionados">
                <h3>Países Seleccionados:</h3>
                <div id="lista-paises" class="lista-paises"></div>
                <button id="btn-comparar" class="btn btn-comparar" onclick="compararPaises()" disabled>
                    Comparar Países
                </button>
                <button id="btn-limpiar" class="btn btn-limpiar" onclick="limpiarSeleccion()">
                    Limpiar
                </button>
            </div>
        </section>

        <section id="resultado" class="resultado-comparacion">
            <!-- Tabla de comparación se insertará aquíi -->
             <h5>Tabla de comparación</h5>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
